# BuddyNet Lab — BuddyParty overlay (Phase 1.4: multi-peer end to end)
#
# One hub holds FIVE tunnels at once and routes to each buddy by name:
#
#   party-{beta,gamma,delta,epsilon,zeta}  (each httpd)  ◄──BuddyNet──┐
#                                                                      ├─► party-hub
#                                                              --vip-listen 8080
#                                                       (--peers-file lists all 5)
#
#   inside party-hub:
#     curl http://beta.buddy:8080  → beta's httpd, via beta's tunnel
#     curl http://zeta.buddy:8080  → zeta's httpd, via zeta's tunnel
#     … all five at once, each through its own isolated worker.
#
# Each node is PINNED by key in the others' manifests (Model A) and pairs via a
# per-pair bootstrap token. Keys + manifests are generated by ./setup-party.sh,
# which writes lab/party/{hub,beta,…}.peers before bringing the stack up.
#
# Buddies share one command list and differ only by NODE_NAME (the entrypoint
# appends --name "$NODE_NAME"). To run with fewer buddies, edit the BUDDIES list
# in setup-party.sh / test-party.sh and remove the matching services here.
#
# Usage (from lab/):
#   ./setup-party.sh        # build, extract keys, write manifests, start
#   ./test-party.sh         # verify all tunnels + isolation on one failing

x-buddy-env: &buddy-env
  BUDDYNET_SERVER: "server:51820"
  BUDDYNET_SERVER_KEY: "${BUDDYNET_SERVER_KEY}"

x-buddy-cmd: &buddy-cmd
  - --role=buddy
  - --key=/var/lib/buddynet/id.key
  - --peers-file=/peers
  - --known-peers=/var/lib/buddynet/known_peers
  - --forward=127.0.0.1:7777
  - --no-interactive
  - --dns
  - --idle-timeout=10m

x-buddy: &buddy
  build:
    context: ..
    dockerfile: lab/Dockerfile.dns
  image: buddynet-lab-dns
  entrypoint: ["/bin/sh", "/entrypoint-party.sh"]
  command: *buddy-cmd
  depends_on:
    - server
  cap_add:
    - NET_BIND_SERVICE
  restart: unless-stopped

services:

  # ── Buddies (service side: httpd + --forward; name via NODE_NAME) ────────────
  party-beta:
    <<: *buddy
    environment: { <<: *buddy-env, NODE_NAME: beta }
    volumes:
      - party-beta-key:/var/lib/buddynet
      - ./party/beta.peers:/peers:ro
      - ./entrypoint-party.sh:/entrypoint-party.sh:ro

  party-gamma:
    <<: *buddy
    environment: { <<: *buddy-env, NODE_NAME: gamma }
    volumes:
      - party-gamma-key:/var/lib/buddynet
      - ./party/gamma.peers:/peers:ro
      - ./entrypoint-party.sh:/entrypoint-party.sh:ro

  party-delta:
    <<: *buddy
    environment: { <<: *buddy-env, NODE_NAME: delta }
    volumes:
      - party-delta-key:/var/lib/buddynet
      - ./party/delta.peers:/peers:ro
      - ./entrypoint-party.sh:/entrypoint-party.sh:ro

  party-epsilon:
    <<: *buddy
    environment: { <<: *buddy-env, NODE_NAME: epsilon }
    volumes:
      - party-epsilon-key:/var/lib/buddynet
      - ./party/epsilon.peers:/peers:ro
      - ./entrypoint-party.sh:/entrypoint-party.sh:ro

  party-zeta:
    <<: *buddy
    environment: { <<: *buddy-env, NODE_NAME: zeta }
    volumes:
      - party-zeta-key:/var/lib/buddynet
      - ./party/zeta.peers:/peers:ro
      - ./entrypoint-party.sh:/entrypoint-party.sh:ro

  # ── Hub (multi-peer side: lists all buddies, binds each VIP on lo) ───────────
  party-hub:
    build:
      context: ..
      dockerfile: lab/Dockerfile.dns
    image: buddynet-lab-dns
    command:
      - --role=buddy
      - --key=/var/lib/buddynet/id.key
      - --peers-file=/peers
      - --known-peers=/var/lib/buddynet/known_peers
      - --vip-listen=8080
      - --no-interactive
      - --name=hub
      - --dns
      - --idle-timeout=10m
    environment: *buddy-env
    depends_on:
      - server
    volumes:
      - party-hub-key:/var/lib/buddynet
      - ./party/hub.peers:/peers:ro
    cap_add:
      - NET_BIND_SERVICE  # :53 stub resolver
      - NET_ADMIN         # bind every buddy's VIP on lo
    restart: unless-stopped

volumes:
  party-beta-key:
  party-gamma-key:
  party-delta-key:
  party-epsilon-key:
  party-zeta-key:
  party-hub-key:
