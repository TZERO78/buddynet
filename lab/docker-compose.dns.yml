# BuddyNet Lab — MagicDNS overlay
#
# Adds two buddies (alice + bob) that announce .buddy names and run the
# stub resolver on 127.0.0.153:53 inside each container.
#
# Usage (from lab/ directory, after ./setup.sh):
#   docker compose -f docker-compose.yml -f docker-compose.dns.yml up -d
#   ./test-dns.sh
#
# The base stack's server is reused; alice and bob use their own token so
# the handshake server keeps them separate from the httpd pair.

services:

  # ── dns-a (alice) ──────────────────────────────────────────────────────────
  # Announces --name alice; runs --dns stub on 127.0.0.153:53 (needs
  # NET_BIND_SERVICE). Forwards incoming streams to a tiny httpd so the
  # test can also verify name → VIP → TCP reachability.
  dns-a:
    build:
      context: ..
      dockerfile: lab/Dockerfile.dns
    image: buddynet-lab-dns
    entrypoint: ["/entrypoint-a.sh"]
    command:
      - --role=buddy
      - --key
      - /var/lib/buddynet/id.key
      - --forward
      - "127.0.0.1:7777"
      - --no-interactive
      - --insecure
      - --idle-timeout=10m
      - --name
      - alice
      - --dns
    environment:
      BUDDYNET_SERVER: "server:51820"
      BUDDYNET_SERVER_KEY: "${BUDDYNET_SERVER_KEY}"
      BUDDYNET_TOKEN: "lab-dns-token"
    depends_on:
      - server
    volumes:
      - dns-a-key:/var/lib/buddynet
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  # ── dns-b (bob) ────────────────────────────────────────────────────────────
  # Announces --name bob; exposes alice's httpd via -L 0.0.0.0:7080 so
  # test-dns.sh can verify that alice.buddy resolves and TCP works over it.
  dns-b:
    build:
      context: ..
      dockerfile: lab/Dockerfile.dns
    image: buddynet-lab-dns
    command:
      - --role=buddy
      - --key
      - /var/lib/buddynet/id.key
      - --L
      - "0.0.0.0:7080"
      - --no-interactive
      - --insecure
      - --idle-timeout=10m
      - --name
      - bob
      - --dns
    environment:
      BUDDYNET_SERVER: "server:51820"
      BUDDYNET_SERVER_KEY: "${BUDDYNET_SERVER_KEY}"
      BUDDYNET_TOKEN: "lab-dns-token"
    depends_on:
      - server
    ports:
      - "7080:7080"
    volumes:
      - dns-b-key:/var/lib/buddynet
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

volumes:
  dns-a-key:
  dns-b-key:
