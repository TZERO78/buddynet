# Enforce restrictive permissions on the BuddyNet buddy config directory, which
# holds the secret token in <name>.env. Applied at boot and on demand, so a
# forgotten `chmod` cannot leave a token world-readable.
#
#   sudo install -m 0644 deployments/systemd/buddynet-tmpfiles.conf /etc/tmpfiles.d/buddynet.conf
#   sudo systemd-tmpfiles --create
#
# d: ensure the directory exists and is 0700 (only root may read its contents).
# z: adjust existing *.env files to 0600 (recursively glob-matched).
d /etc/buddynet 0700 root root -
z /etc/buddynet/*.env 0600 root root -
