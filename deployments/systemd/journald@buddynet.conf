# Size-capped journal for the BuddyNet services. The units set
# LogNamespace=buddynet, which gives them a SEPARATE journald instance
# (systemd-journald@buddynet) configured by THIS file — so BuddyNet logs can
# never grow into and fill the main system journal or the disk, even under a UDP
# flood or with verbose --debug. This is the storage-safety guarantee.
#
#   sudo install -m 0644 deployments/systemd/journald@buddynet.conf \
#       /etc/systemd/journald@buddynet.conf
#   sudo systemctl restart systemd-journald@buddynet
#
# Read the namespaced logs with:  journalctl --namespace=buddynet
[Journal]
# Persist to disk but hard-cap total and per-file size.
Storage=persistent
SystemMaxUse=50M
SystemKeepFree=200M
SystemMaxFileSize=10M
RuntimeMaxUse=20M
# Drop entries older than a week regardless of size.
MaxRetentionSec=1week
# Compress and forward nothing else (keep it self-contained).
Compress=yes
ForwardToSyslog=no
ForwardToWall=no
