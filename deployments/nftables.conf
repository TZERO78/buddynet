#!/usr/sbin/nft -f
#
# BuddyNet VPS firewall (nftables): default-drop, with only SSH and the two
# BuddyNet UDP ports open. The UDP ports are rate-limited to blunt floods —
# the server's in-process caps and the container's MemoryMax/TasksMax bound the
# process, but only the firewall protects the kernel UDP stack and your
# bandwidth. Adjust the two ports below to match your --listen settings.
#
#   sudo install -m 0644 deployments/nftables.conf /etc/nftables.d/buddynet.conf
#   sudo nft -f /etc/nftables.d/buddynet.conf
#   # or include it from /etc/nftables.conf
#
# WARNING: this sets the input policy to drop. SSH (22) is explicitly allowed
# below so you are not locked out; change it if your SSH runs elsewhere.

# --- ports (keep in sync with --listen / --relay-listen) ---------------------
define port_handshake = 51820
define port_relay     = 51821
define port_ssh       = 22

table inet buddynet {
    chain input {
        type filter hook input priority filter; policy drop;

        # Always allow loopback and already-established flows.
        iif lo accept
        ct state established,related accept
        ct state invalid drop

        # ICMP / ICMPv6 (needed for PMTU discovery and basic diagnostics).
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # Management.
        tcp dport $port_ssh accept

        # BuddyNet control + relay, rate-limited against UDP floods.
        udp dport $port_handshake limit rate 100/second burst 50 packets accept
        udp dport $port_relay     limit rate 100/second burst 50 packets accept

        # Everything else is dropped by the chain policy.
    }

    chain forward { type filter hook forward priority filter; policy drop; }
    chain output  { type filter hook output  priority filter; policy accept; }
}
