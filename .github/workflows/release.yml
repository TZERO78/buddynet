name: release

# Cross-compile the single buddynet binary for every target, sign each artifact
# (keyless cosign / Sigstore), attach an SBOM, and publish the GitHub release.
# Triggered by pushing a v* tag.
on:
  push:
    tags: ["v*"]

# Least privilege per job: the build job needs OIDC (id-token) for keyless
# signing but not write; only the publish job writes the release.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # keyless cosign signing via the GitHub OIDC token
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }   # Raspberry Pi, Unraid
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }   # Apple Silicon
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: build, checksum and sign
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME}"
          ext=""; [ "$GOOS" = windows ] && ext=".exe"
          out="buddynet-${GOOS}-${GOARCH}${ext}"
          # -s -w strips symbol/debug info to keep the binary small; -trimpath
          # makes the build reproducible.
          go build -trimpath -ldflags="-s -w -X main.version=${version}" \
            -o "dist/${out}" ./cmd/buddynet
          ( cd dist && sha256sum "${out}" > "${out}.sha256" )
          # Keyless signature + certificate, verifiable with:
          #   cosign verify-blob --certificate <out>.pem --signature <out>.sig \
          #     --certificate-identity-regexp '^https://github.com/TZERO78/buddynet' \
          #     --certificate-oidc-issuer https://token.actions.githubusercontent.com <out>
          cosign sign-blob --yes \
            --output-signature "dist/${out}.sig" \
            --output-certificate "dist/${out}.pem" \
            "dist/${out}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: buddynet-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release and upload assets
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      # Software Bill of Materials for the module graph, attached to the release.
      - name: generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist/buddynet-${{ github.ref_name }}-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          generate_release_notes: true
