name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      - name: gofmt
        run: |
          unformatted=$(gofmt -l ./cmd ./internal ./pkg)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test (race)
        run: go test -race ./...

      - name: build
        run: go build ./...

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable

      # Known CVEs in our dependencies AND in the Go toolchain, filtered to the
      # code paths we actually call. High signal, low noise — blocking.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # Static security analysis. Several rules are excluded because they fire
      # only as false positives on this codebase (see the comment at each site):
      #   G402 InsecureSkipVerify — intentional: PKI-free, identity is pinned by
      #        key in VerifyPeerCertificate (internal/tunnel/{quic,control}.go).
      #   G123 TLS resumption + VerifyPeerCertificate — peers are key-pinned across
      #        reconnects; tracked as a hardening follow-up, not a vuln.
      #   G117 "struct field matches secret pattern" on JSON marshaling — that IS
      #        the wire protocol (SessionToken etc.); marshaling it is the point.
      #   G115 int64->uint64 of a positive cookie epoch — provably non-negative.
      #   G104 unchecked best-effort writes (conn.WriteToUDP), G304 file opens from
      #        config-supplied paths — pervasive in net/CLI code, not vulnerabilities.
      #   G703 path traversal via taint analysis — the taint-analysis sibling of
      #        G304: every file path here is the node operator's OWN CLI/config path
      #        (--peers-file/--known-peers/--authorized), never attacker input. Same
      #        non-vulnerability as G304; excluded for consistency.
      # Every other rule (exec, SQL, weak crypto, etc.) stays blocking. Installed
      # and run with the runner's Go (setup-go above), not the dockerized action —
      # that image bundles an older Go that GOTOOLCHAIN=local rejects against our
      # go.mod (go >= 1.25).
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity medium -exclude=G104,G115,G117,G123,G304,G402,G703 ./...
