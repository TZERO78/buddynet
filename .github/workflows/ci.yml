name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: gofmt
        run: |
          unformatted=$(gofmt -l ./cmd ./internal ./pkg)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test (race)
        run: go test -race ./...

      - name: build
        run: go build ./...
